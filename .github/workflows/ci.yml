name: LLMOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v3

    - name: Build the Docker Image
      run: |
        echo "Building the AI API container..."
        docker build -t llmops-rag-api:latest .
        
    - name: Test Container Startup
      run: |
        echo "Testing if the container starts correctly..."
        # We pass a dummy API key just to allow the container to start for a health check
        docker run -d -p 8000:8000 -e GROQ_API_KEY="dummy_key" --name rag_api llmops-rag-api:latest
        sleep 5
        docker logs rag_api